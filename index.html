<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通话数据 - 融鑫汇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #d4af37 0%, #f5d67b 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        .user-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .user-btn {
            padding: 12px 24px;
            border: 2px solid #d4af37;
            background: transparent;
            color: #d4af37;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .user-btn:hover, .user-btn.active {
            background: #d4af37;
            color: #1a1a2e;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .user-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .user-section h2 {
            color: #d4af37;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            font-size: 1.3rem;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }
        .stat-value.gold {
            color: #d4af37;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-row:last-child {
            border-bottom: none;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .error {
            text-align: center;
            padding: 50px;
            color: #ff6b6b;
        }
        .no-data {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📞 通话数据统计</h1>
            <p class="subtitle">云端同步 · 实时更新</p>
        </header>
        
        <div class="user-selector" id="userSelector"></div>
        
        <div id="content">
            <div class="loading">正在加载数据...</div>
        </div>
    </div>

    <script>
        const repoOwner = 'ztj555';
        const repoName = 'tonghuashuju';
        const baseUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents`;
        
        let allData = {};
        let selectedUser = null;

        async function loadData() {
            try {
                const response = await fetch(baseUrl, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' }
                });
                
                if (!response.ok) throw new Error('加载失败');
                
                const contents = await response.json();
                const userDirs = contents.filter(item => item.type === 'dir' && item.name !== 'data');
                
                if (userDirs.length === 0) {
                    document.getElementById('content').innerHTML = '<div class="no-data">暂无同步数据</div>';
                    return;
                }

                // 加载每个用户的数据
                for (const user of userDirs) {
                    await loadUserData(user.name);
                }
                
                // 渲染用户选择器
                renderUserSelector(Object.keys(allData));
                
                // 默认选中第一个用户
                if (Object.keys(allData).length > 0) {
                    selectUser(Object.keys(allData)[0]);
                }
                
            } catch (error) {
                document.getElementById('content').innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }

        async function loadUserData(userName) {
            try {
                const dataPath = `${userName}/data`;
                const response = await fetch(`${baseUrl}/${dataPath}`, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' }
                });
                
                if (!response.ok) return;
                
                const contents = await response.json();
                const monthDirs = contents.filter(item => item.type === 'dir');
                
                let latestData = null;
                let latestDate = null;
                
                for (const month of monthDirs) {
                    const monthResponse = await fetch(`${baseUrl}/${dataPath}/${month.name}`, {
                        headers: { 'Accept': 'application/vnd.github.v3+json' }
                    });
                    
                    if (!monthResponse.ok) continue;
                    
                    const files = await monthResponse.json();
                    const summaryFiles = files.filter(f => f.name.startsWith('summary_') && f.name.endsWith('.json'));
                    
                    for (const file of summaryFiles) {
                        const fileResponse = await fetch(file.download_url);
                        if (!fileResponse.ok) continue;
                        
                        const data = await fileResponse.json();
                        if (!latestDate || data.date > latestDate) {
                            latestDate = data.date;
                            latestData = data;
                        }
                    }
                }
                
                if (latestData) {
                    allData[userName] = latestData;
                }
                
            } catch (error) {
                console.error(`加载用户 ${userName} 数据失败:`, error);
            }
        }

        function renderUserSelector(users) {
            const selector = document.getElementById('userSelector');
            selector.innerHTML = users.map(user => 
                `<button class="user-btn" onclick="selectUser('${user}')">${user}</button>`
            ).join('');
        }

        function selectUser(userName) {
            selectedUser = userName;
            
            // 更新按钮状态
            document.querySelectorAll('.user-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === userName);
            });
            
            const data = allData[userName];
            if (!data) {
                document.getElementById('content').innerHTML = '<div class="no-data">该用户暂无数据</div>';
                return;
            }
            
            const html = `
                <div class="user-section">
                    <h2>👤 ${userName}</h2>
                    <p style="color: #888; margin-bottom: 20px;">数据日期: ${data.date}</p>
                    
                    <div class="stat-card">
                        <div class="stat-label">总通话次数</div>
                        <div class="stat-value gold">${data.totalCalls} 次</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">总通话时长</div>
                        <div class="stat-value">${formatDuration(data.totalDuration)}</div>
                    </div>
                    
                    <div class="stat-row">
                        <span>📲 来电</span>
                        <span>${data.incomingCalls} 次 (${formatDuration(data.incomingDuration)})</span>
                    </div>
                    
                    <div class="stat-row">
                        <span>📞 去电</span>
                        <span>${data.outgoingCalls} 次 (${formatDuration(data.outgoingDuration)})</span>
                    </div>
                    
                    <div class="stat-row">
                        <span>❌ 未接</span>
                        <span>${data.missedCalls} 次</span>
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }

        function formatDuration(seconds) {
            if (!seconds) return '0秒';
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (hours > 0) {
                return `${hours}小时${minutes}分${secs}秒`;
            } else if (minutes > 0) {
                return `${minutes}分${secs}秒`;
            } else {
                return `${secs}秒`;
            }
        }

        // 页面加载时获取数据
        loadData();
    </script>
</body>
</html>
